spring.application.name=chat-app

# PostgreSQL Database Configuration
# In production contexts like Render, the DATABASE_URL is parsed
# Here we use standard properties which can be overridden by environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable static resource serving for uploaded files
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:uploads/
